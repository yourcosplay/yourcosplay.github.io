<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>{{ page.title }} - {{ site.title }}</title>
  
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/simplelightbox/2.14.3/simple-lightbox.min.css">

  {% if site.popads_manager.enabled %}
  <script type="text/javascript">
    {{ site.popads_manager.script_code }}
  </script>
  {% endif %}
</head>
<body>

  <header class="main-navigation">
    <div class="nav-container">
      <a href="{{ '/' | relative_url }}" class="brand-logo">Cos<span>Showcase</span></a>
      <nav class="nav-categories">
  <a href="{{ '/' | relative_url }}" data-filter="semua" class="active">Semua</a>
  <a href="{{ '/?cat=indo' | relative_url }}" data-filter="indo">Indo</a>
  <a href="{{ '/?cat=gravure' | relative_url }}" data-filter="gravure">Gravure</a>
  <a href="{{ '/?cat=fans-premium' | relative_url }}" data-filter="fans-premium">Fans Premium</a>
  <a href="{{ '/?cat=aktris-profesional' | relative_url }}" data-filter="aktris-profesional">Aktris</a>
</nav>
    </div>
  </header>

  {{ content }}

  <script src="https://cdnjs.cloudflare.com/ajax/libs/simplelightbox/2.14.3/simple-lightbox.min.js"></script>
</body>
</html>
