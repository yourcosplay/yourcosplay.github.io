title: CosShowcase
codename: CosShowcase v1.0
target_date: "Juli 2026"
permalink: /:categories/:title/
markdown: kramdown
highlighter: rouge

# Kategori Wajib sesuai PRD
scope_categories:
  - indo
  - gravure
  - fans-premium
  - aktris-profesional

# Modul Ads Manager Global (PopAds Script)
popads_manager:
  enabled: true
  # Tempel kode script unik yang diberikan oleh PopAds Anda di sini (Gunakan format multi-line YAML)
  script_code: |
    /* PopAds.net Popunder Code for Website */
    window._pop = window._pop || [];
    window._pop.push(['siteId', 1234567]); // Ganti dengan ID Situs PopAds Anda
    window._pop.push(['minBid', 0.000000]);
    window._pop.push(['popundersPerIP', 0]);
    window._pop.push(['delayBetween', 0]);
    window._pop.push(['default', false]);
    window._pop.push(['defaultPerDay', 0]);
    window._pop.push(['topmost', true]);
    (function() {
      var pa = document.createElement('script'); pa.type = 'text/javascript'; pa.async = true;
      var s = document.getElementsByTagName('script')[0]; 
      pa.src = '//c1.popads.net/pop.js';
      pa.onerror = function() {
        var sa = document.createElement('script'); sa.type = 'text/javascript'; sa.async = true;
        sa.src = '//c2.popads.net/pop.js';
        s.parentNode.insertBefore(sa, s);
      };
      s.parentNode.insertBefore(pa, s);
    })();

# Tambahkan baris ini di config lama Anda
plugins:
  - jekyll-paginate

paginate: 9               # Menampilkan maksimal 9 postingan cosplayer per halaman
paginate_path: "/page:num/" # Hasilnya nanti: /page2/, /page3/, dst.